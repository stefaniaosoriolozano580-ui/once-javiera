<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Torneo de Videojuegos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background-color: #1e293b;
        }

        th, td {
            border: 1px solid #38bdf8;
            padding: 10px;
        }

        th {
            background-color: #0284c7;
        }

        tfoot {
            background-color: #22c55e;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <h1>Torneo Gamer Interregional 🎮</h1>

    <table>
        <thead>
            <tr>
                <th colspan="7">Tabla de Clasificación</th>
            </tr>
            <tr>
                <th>Región</th>
                <th>Equipo</th>
                <th>J</th>
                <th>G</th>
                <th>P</th>
                <th>Puntos</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2">Norte</td>
                <td>Alpha</td>
                <td>10</td>
                <td>8</td>
                <td>2</td>
                <td>980</td>
                <td>Clasificado</td>
            </tr>
            <tr>
                <td>Beta</td>
                <td>10</td>
                <td>6</td>
                <td>4</td>
                <td>870</td>
                <td>Clasificado</td>
            </tr>

            <tr>
                <td rowspan="2">Sur</td>
                <td>Gamma</td>
                <td>10</td>
                <td>7</td>
                <td>3</td>
                <td>920</td>
                <td>Clasificado</td>
            </tr>
            <tr>
                <td>Delta</td>
                <td>10</td>
                <td>3</td>
                <td>7</td>
                <td>750</td>
                <td>Eliminado</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="7">
                    🏆 Campeón: Equipo Alpha | Total participantes: 4 equipos
                </td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
